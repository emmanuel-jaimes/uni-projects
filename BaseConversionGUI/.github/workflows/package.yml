# .github/workflows/package.yml
name: Package App

on: [push]

jobs:
  package-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Package for macOS
        run: |
          jpackage --input . \
            --main-jar BaseConversionGUI.jar \
            --main-class BaseChangeGUITest \
            --name "BaseConversionGUI" --app-version "1.0.0" \
            --type dmg
      - uses: actions/upload-artifact@v4
        with:
          name: mac-package
          path: "*.dmg"

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Package for Windows
        run: |
          jpackage --input . `
            --main-jar BaseConversionGUI.jar `
            --main-class BaseChangeGUITest `
            --name "BaseConversionGUI" --app-version "1.0.0" `
            --type exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: "*.exe"
